# CI — Unit-Tests (Node's built-in runner, zero test deps) + Production-Build.
# Der Coverage-Report landet im Job-Log (node --experimental-test-coverage).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    name: Node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Unit-Tests + Coverage + Doku-Sync
        # Führt die Suite mit Coverage aus UND prüft, dass Coverage-Badge und
        # Test-Anzahl in README.md/CLAUDE.md der Messung entsprechen — die
        # statischen Doku-Zahlen können so nicht still veralten.
        run: node tools/check-doc-sync.mjs
      - name: Production-Build
        run: npm run build
