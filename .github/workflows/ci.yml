# CI — Unit-Tests (Node's built-in runner, zero test deps) + Production-Build.
# Der Coverage-Report landet im Job-Log (node --experimental-test-coverage).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    name: Node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Unit-Tests + Coverage
        run: node --test --experimental-test-coverage tests/
      - name: Production-Build
        run: npm run build
