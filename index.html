    <meta property="og:type" content="website" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Kiez-Finder",
      "url": "https://kiezfinder.celox.io/",
      "applicationCategory": "TravelApplication",
      "operatingSystem": "Web",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" },
      "inLanguage": "de",
      "description": "Dein Kiez-Pass für Berlin: Standort → Kiez, offizielle LOR-2021-Grenzen, Bezirke/Bezirksregionen/Kieze als Overlay und Fuzzy-Suche.",
      "image": "https://kiezfinder.celox.io/og.png"
    }
    </script>

    <link rel="preload" href="/fonts/space-grotesk-var.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-var.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preconnect" href="https://basemaps.cartocdn.com" crossorigin />
    <link rel="dns-prefetch" href="https://nominatim.openstreetmap.org" />

    <!-- Pre-paint: flag JS + restore theme before first paint (no FOUC, nothing can get stuck invisible) -->
    <script>
      (function () {
        var d = document.documentElement;
        d.classList.remove('no-js');
        d.classList.add('js');
        var t = null;
        try { t = localStorage.getItem('kf-theme'); } catch (e) {}
        try {
          // OS-preference fallback stays outside the storage try — a blocked
          // localStorage (private mode) must not force dark on light-mode users
          if (t !== 'light' && t !== 'dark') t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          d.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>

  <body>
    <noscript>
      <div class="noscript">
        <h1>Kiez-Finder</h1>
        <p>Kiez-Finder braucht JavaScript, um deinen Standort zu bestimmen und die Karte deines Kiezes zu zeichnen. Bitte aktiviere JavaScript.</p>
      </div>
    </noscript>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
